                { id: "d7", category: { TH: "การรับเสิร์ฟ (Return of Serve)", EN: "Return of Serve" }, options: [{ id: "A", points: 1, text: { TH: "เจอลูกเสิร์ฟเร็วๆ จะแหย่ไม้รับไม่ค่อยทัน", EN: "Struggles with fast pace, often just blocking wildly" } }, { id: "B", points: 2, text: { TH: "รีเทิร์นลูกเสิร์ฟทั่วไปได้ แต่คุมทิศทางลำบาก", EN: "Can return average serves consistently, but struggles with placement" } }, { id: "C", points: 3, text: { TH: "ก้าวเข้าสนามเพื่อตบเสิร์ฟสองที่อ่อนแอได้", EN: "Confidently steps in to attack weak second serves" } }, { id: "D", points: 4, text: { TH: "รับลูกเสิร์ฟแรงๆ ให้กลับไปตกลึกท้ายคอร์ตได้", EN: "Easily neutralizes heavy first serves with deep returns" } }] },
                { id: "d8", category: { TH: "ทักษะหน้าเน็ต (Volley)", EN: "Net Play & Transition" }, options: [{ id: "A", points: 1, text: { TH: "จับไม้แบบโฟร์แฮนด์มารับวอลเลย์ รู้สึกไม่มั่นใจ", EN: "Uncomfortable at the net, often volleying with a groundstroke grip" } }, { id: "B", points: 2, text: { TH: "วอลเลย์ลูกระดับอกได้ แต่ลูกต่ำๆ จะงัดไม่ค่อยขึ้น", EN: "Solid on chest-high volleys, but struggles digging out low ones" } }, { id: "C", points: 3, text: { TH: "จับแบบ Continental ต่อยลูกวอลเลย์คุมทิศทางได้", EN: "Uses a continental grip with good directional control and punch" } }, { id: "D", points: 4, text: { TH: "หยอดหน้าเน็ต (Drop Volley) และจบแต้มได้เฉียบขาด", EN: "Decisively finishes points with crisp volleys and touch (drop volleys)" } }] },
                { id: "d9", category: { TH: "ลูกตบเหนือหัว (Overhead)", EN: "Overhead Execution" }, options: [{ id: "A", points: 1, text: { TH: "กะจังหวะพลาดบ่อย หรือต้องปล่อยให้ลูกตกพื้นก่อน", EN: "Poor timing, usually lets the ball bounce before hitting" } }, { id: "B", points: 2, text: { TH: "ตบลูกง่ายๆ ได้ แต่มักจะพลาดถ้าต้องถอยหลังตบ", EN: "Can put away easy lobs, but struggles when backpedaling" } }, { id: "C", points: 3, text: { TH: "ตบลูกได้ชัวร์แม้ยืนอยู่บริเวณเส้นเสิร์ฟ (Service Line)", EN: "Very reliable, even when hitting overheads from the service line" } }, { id: "D", points: 4, text: { TH: "กระโดดตบ (Scissor kick) หรือทำแต้มได้จากทุกจุด", EN: "Highly offensive; can hit scissor-kick overheads from almost anywhere" } }] },
                { id: "d10", category: { TH: "การงัดลูกล็อบและการตั้งรับ", EN: "Defense & Lobs" }, options: [{ id: "A", points: 1, text: { TH: "เมื่อเสียเปรียบ มักจะตีลูกโด่งสั้นๆ โดนดักตบ", EN: "Throws up short, defensive lobs that get easily put away" } }, { id: "B", points: 2, text: { TH: "งัดลูกล็อบโด่งเพื่อซื้อเวลาให้ตัวเองกลับมาตั้งหลักได้", EN: "Hits high, deep defensive lobs to buy time and reset the point" } }, { id: "C", points: 3, text: { TH: "ตีลูกท็อปสปินล็อบข้ามหัวคนขึ้นเน็ตได้", EN: "Can hit offensive topspin lobs effectively over the net player" } }, { id: "D", points: 4, text: { TH: "วิ่งสุดคอร์ตแล้วสวนกลับด้วย Passing Shot ได้ลุ้นเสมอ", EN: "Exceptional defense; constantly hits passing shots while on the dead run" } }] },
                { id: "d11", category: { TH: "จังหวะฝีเท้า (Footwork)", EN: "Footwork & Movement" }, options: [{ id: "A", points: 1, text: { TH: "ตีเสร็จแล้วมักจะยืนดูบอล ไม่วิ่งกลับมารอตรงกลาง", EN: "Tends to ball-watch after hitting, leading to slow recovery" } }, { id: "B", points: 2, text: { TH: "ครอบคลุมพื้นที่คอร์ตเดี่ยวได้ดี แต่ก้าวเท้ายังช้า", EN: "Covers the court reasonably well, but can be a bit heavy-footed" } }, { id: "C", points: 3, text: { TH: "ทำ Split-step สม่ำเสมอ และกลับเข้าตำแหน่งเร็ว", EN: "Always uses a split-step and recovers quickly to the center" } }, { id: "D", points: 4, text: { TH: "ออกตัวเร็วมาก สไลด์เท้าหรือปรับก้าวเล็กๆ ก่อนตีได้เนียน", EN: "Explosive first step with excellent micro-adjustments before striking" } }] },
                { id: "d12", category: { TH: "วิสัยทัศน์และแทคติก", EN: "Match IQ & Tactics" }, options: [{ id: "A", points: 1, text: { TH: "โฟกัสแค่วงสวิงตัวเอง ไม่ทันได้สังเกตคู่แข่ง", EN: "Focuses entirely on own swing mechanics, not the opponent" } }, { id: "B", points: 2, text: { TH: "เล่นแบบ Play Safe ตีโต้ไปเรื่อยๆ รอคู่แข่งพลาด", EN: "Plays 'safe' and mostly just waits for the opponent to make an error" } }, { id: "C", points: 3, text: { TH: "หาจุดอ่อนคู่แข่งเจอ (เช่น แบ็คแฮนด์อ่อน) และเจาะตรงนั้น", EN: "Quickly identifies and consistently targets the opponent's weaknesses" } }, { id: "D", points: 4, text: { TH: "สร้างรูปแบบการเข้าทำได้ และเปลี่ยนแผนแก้เกมได้ทันที", EN: "Strategically constructs points and easily adapts tactics mid-match" } }] }
            ]
        };

        function App() {
            const [currentLang, setCurrentLang] = useState('TH');
            const [view, setView] = useState('welcome');
            const [selectedMode, setSelectedMode] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [scoreHistory, setScoreHistory] = useState([]);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [calculatedLevel, setCalculatedLevel] = useState(null);

            const toggleLanguage = () => setCurrentLang(prev => prev === 'TH' ? 'EN' : 'TH');

            const startQuiz = (mode) => {
                setSelectedMode(mode);
                setCurrentQuestionIndex(0);
                setScore(0);
                setScoreHistory([]);
                setSelectedAnswer(null);
                setView('quiz');
            };

            const handleNext = () => {
                if (selectedAnswer === null) return;
                const newScore = score + selectedAnswer;
                setScore(newScore);
                setScoreHistory(prev => [...prev, selectedAnswer]);
                const questions = selectedMode === 'quick' ? appData.quickQuestions : appData.deepQuestions;
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setSelectedAnswer(null);
                } else {
                    const avg = newScore / questions.length;
                    let level = "2.0";
                    if (avg >= 3.5) level = "4.5+";
                    else if (avg >= 3.0) level = "4.0";
                    else if (avg >= 2.5) level = "3.5";
                    else if (avg >= 2.0) level = "3.0";
                    else if (avg >= 1.5) level = "2.5";
                    else level = "2.0";
                    setCalculatedLevel(level);
                    setView('results');
                }
            };

            const handleBack = () => {
                if (currentQuestionIndex === 0) return;
                const lastAnswer = scoreHistory[scoreHistory.length - 1];
                setScore(prev => prev - lastAnswer);
                setScoreHistory(prev => prev.slice(0, -1));
                setCurrentQuestionIndex(prev => prev - 1);
                setSelectedAnswer(null);
            };

            const copyResultLink = () => {
                const shareUrl = window.location.href;
                const isEn = currentLang === 'EN';
                
                navigator.clipboard.writeText(shareUrl).then(() => {
                    const btn = document.getElementById('copy-link-btn');
                    if (!btn) return;
                    const originalText = btn.innerHTML;
                    
                    btn.innerHTML = isEn ? "✅ Link Copied!" : "✅ คัดลอกลิงก์แล้ว!";
                    btn.classList.add('bg-green-600');
                    btn.classList.remove('bg-[#2C2C2C]');
                    
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-green-600');
                        btn.classList.add('bg-[#2C2C2C]');
                    }, 2000);
                });
            };

            const t = appData.ui[currentLang];
            const questions = selectedMode === 'quick' ? appData.quickQuestions : appData.deepQuestions;
            const currentQuestion = questions ? questions[currentQuestionIndex] : null;
            const progress = questions ? ((currentQuestionIndex + 1) / questions.length) * 100 : 0;

            return (
                <div className="min-h-screen bg-[#FDFBF7] text-[#2C2C2C] font-['Kanit'] selection:bg-[#E5D3C5] overflow-x-hidden">
                    <nav className="flex items-center justify-between px-8 py-6 bg-[#FDFBF7]/80 backdrop-blur-md sticky top-0 z-50 border-b border-[#E5D3C5]">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('welcome')}>
                            <style>{"@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');"}</style>
                            <div className="text-2xl font-bold tracking-tight flex items-center z-10" style={{ fontFamily: "'Playfair Display', serif" }}>
                                <span className="text-[#2C2C2C] relative">
                                    O
                                    <span className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[0.4em] h-[0.4em] bg-[#6F4E37]/20 rounded-full -z-10"></span>
                                </span>
                                <span className="text-[#2C2C2C]">ctopus</span>
                                <span className="ml-2 text-xl">🐙</span>
                            </div>
                        </div>
                        <button onClick={toggleLanguage} className={`font-medium py-2 px-6 rounded-lg transition-all duration-300 active:scale-95 border border-[#2C2C2C]/10 ${currentLang === 'TH' ? 'bg-[#2C2C2C] text-white' : 'bg-[#6F4E37] text-white'}`}>
                            {currentLang === 'TH' ? 'EN' : 'TH'}
                        </button>
                    </nav>

                    <main className="max-w-4xl mx-auto px-6 py-8 md:py-16">
                        <AnimatePresence mode="wait">
                            {view === 'welcome' && (
                                <motion.section key="welcome" initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -10 }} className="flex flex-col items-center text-center space-y-12">
                                    <div className="space-y-8">
                                        <h1 className="text-5xl md:text-6xl font-bold text-[#2C2C2C] leading-tight tracking-tight" style={{ fontFamily: "'Playfair Display', serif" }}>
                                            {t.title} <br />
                                            <span className="text-[#6F4E37] italic">
                                                {t.titleAccent}
                                            </span>
                                        </h1>
                                        <p className="text-base text-[#5C5C5C] max-w-lg mx-auto font-light leading-relaxed">{t.description}</p>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-center justify-center gap-6 w-full pt-4">
                                        <button onClick={() => startQuiz('quick')} className="w-full sm:w-64 px-8 py-4 bg-[#2C2C2C] text-white text-lg font-medium rounded-xl transition-all duration-300 hover:bg-[#1A1A1A] active:scale-95 flex flex-col items-center justify-center group border border-[#2C2C2C]">
                                            <span className="tracking-wide">{t.quickBtn}</span>
                                            <span className="text-xs font-light opacity-60 group-hover:opacity-100 mt-1">{t.quickTime}</span>
                                        </button>
                                        <button onClick={() => startQuiz('deep')} className="w-full sm:w-64 px-8 py-4 bg-transparent text-[#2C2C2C] text-lg font-medium rounded-xl transition-all duration-300 hover:bg-[#2C2C2C]/5 active:scale-95 flex flex-col items-center justify-center group border border-[#2C2C2C]">
                                            <span className="tracking-wide">{t.deepBtn}</span>
                                            <span className="text-xs font-light opacity-60 group-hover:opacity-100 mt-1">{t.deepTime}</span>
                                        </button>
                                    </div>
                                </motion.section>
                            )}

                            {view === 'quiz' && currentQuestion && (
                                <motion.section key="quiz" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="mt-0 md:mt-4 max-w-2xl mx-auto">
                                    <div className="mb-6 md:mb-12 space-y-3 md:space-y-4">
                                        <div className="flex justify-between items-end">
                                            <span className="text-[10px] md:text-xs font-bold text-[#6F4E37] uppercase tracking-[0.2em]">{selectedMode === 'quick' ? t.quickBtn : t.deepBtn}</span>
                                            <span className="text-[10px] md:text-xs font-medium text-[#5C5C5C] tabular-nums">{currentQuestionIndex + 1} / {questions.length}</span>
                                        </div>
                                        <div className="h-1 bg-[#E5D3C5] rounded-full overflow-hidden">
                                            <motion.div initial={{ width: 0 }} animate={{ width: `${progress}%` }} className="h-full bg-[#2C2C2C] rounded-full" />
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-2xl md:rounded-3xl p-6 md:p-14 shadow-xl shadow-[#2C2C2C]/5 border border-[#E5D3C5] relative overflow-hidden">
                                        <div className="relative z-10 space-y-6 md:space-y-10">
                                            <h2 className="text-xl md:text-3xl font-bold text-[#2C2C2C] leading-snug">{currentQuestion.category[currentLang]}</h2>
                                            <div className="grid gap-3 md:gap-5">
                                                {currentQuestion.options.map((option) => (
                                                    <motion.button key={option.id} onClick={() => setSelectedAnswer(option.points)} className={`w-full p-4 md:p-6 text-left rounded-xl border transition-all duration-300 flex items-center gap-4 md:gap-5 group ${selectedAnswer === option.points ? 'bg-[#2C2C2C] border-[#2C2C2C] text-white' : 'bg-transparent border-[#E5D3C5] hover:border-[#2C2C2C] text-[#5C5C5C] hover:text-[#2C2C2C]'}`}>
                                                        <span className={`w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center font-bold text-xs md:text-sm shrink-0 transition-colors ${selectedAnswer === option.points ? 'bg-white/20 text-white' : 'bg-[#FDFBF7] text-[#5C5C5C] group-hover:bg-[#2C2C2C]/5'}`}>{option.id}</span>
                                                        <span className="font-medium text-sm md:text-lg leading-tight">{option.text[currentLang]}</span>
                                                    </motion.button>
                                                ))}
                                            </div>
                                            <div className="pt-4 md:pt-8 flex gap-3 md:gap-4">
                                                {currentQuestionIndex > 0 && (
                                                    <button onClick={handleBack} className="flex-1 py-4 md:py-5 rounded-xl font-bold text-sm md:text-lg transition-all duration-300 bg-transparent text-[#2C2C2C] border border-[#2C2C2C]/20 hover:bg-[#2C2C2C]/5 active:scale-95">
                                                        {currentLang === 'TH' ? 'ย้อนกลับ' : 'Back'}
                                                    </button>
                                                )}
                                                <button onClick={handleNext} disabled={selectedAnswer === null} className={`flex-[2] py-4 md:py-5 rounded-xl font-bold text-sm md:text-lg transition-all duration-300 ${selectedAnswer !== null ? 'bg-[#6F4E37] text-white hover:bg-[#5A3F2D] active:scale-95' : 'bg-[#E5D3C5] text-white cursor-not-allowed'}`}>
                                                    {currentQuestionIndex === questions.length - 1 ? t.finishBtn : t.nextBtn}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </motion.section>
                            )}

                            {view === 'results' && calculatedLevel && (
                                <motion.section key="results" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="mt-4 max-w-3xl mx-auto">
                                    <div className="bg-white rounded-[2.5rem] p-10 md:p-16 shadow-2xl shadow-[#2C2C2C]/5 text-center space-y-12 border border-[#E5D3C5] relative z-10 overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-2 bg-[#6F4E37]"></div>
                                        {(() => {
                                            const levelInfo = appData.levelData[calculatedLevel];
                                            return (
                                                <>
                                                    <motion.div 
                                                        initial={{ scale: 0.8, opacity: 0 }} 
                                                        animate={{ scale: 1, opacity: 1 }} 
                                                        transition={{ delay: 0.2 }} 
                                                        className="inline-block p-10 bg-[#FDFBF7] rounded-full text-7xl md:text-8xl"
                                                    >
                                                        {levelInfo.emoji}
                                                    </motion.div>
                                                    <div className="space-y-4">
                                                        <div className="flex flex-col items-center gap-2">
                                                            <span className="text-[#6F4E37] font-bold text-sm uppercase tracking-[0.3em]">NTRP Level {calculatedLevel}</span>
                                                            <h2 className="text-2xl md:text-3xl font-bold text-[#2C2C2C] leading-tight" style={{ fontFamily: "'Playfair Display', serif" }}>{levelInfo.name[currentLang]}</h2>
                                                        </div>
                                                        <p className="text-[#5C5C5C] text-lg font-light italic max-w-lg mx-auto mt-6 leading-relaxed">
                                                            "{levelInfo.desc[currentLang]}"
                                                        </p>
                                                    </div>
                                                </>
                                            );
                                        })()}
                                        
                                        <div className="grid md:grid-cols-2 gap-8 text-left pt-4">
                                            <div className="space-y-6">
                                                <h3 className="font-bold text-[#2C2C2C] text-sm uppercase tracking-widest border-b border-[#E5D3C5] pb-2">🎾 {t.tournamentsLabel}</h3>
                                                <ul className="space-y-3">
                                                    {appData.levelData[calculatedLevel].tournaments[currentLang].map((tourney, idx) => (
                                                        <li key={idx} className="flex items-start gap-3 text-[#5C5C5C] font-medium text-sm leading-snug"><span className="text-[#6F4E37] mt-1">/</span>{tourney}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="space-y-6">
                                                <h3 className="font-bold text-[#2C2C2C] text-sm uppercase tracking-widest border-b border-[#E5D3C5] pb-2">💡 {t.tipsLabel}</h3>
                                                <ul className="space-y-3">
                                                    {appData.levelData[calculatedLevel].tips[currentLang].map((tip, idx) => (
                                                        <li key={idx} className="flex items-start gap-3 text-[#5C5C5C] font-medium text-sm leading-snug"><span className="text-[#6F4E37] mt-1">/</span>{tip}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                        <div className="flex flex-col sm:flex-row justify-center gap-6 pt-8">
                                            <motion.button id="copy-link-btn" whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={copyResultLink} className="px-12 py-5 bg-[#2C2C2C] text-white font-bold text-lg rounded-xl transition-all">{t.copyBtn}</motion.button>
                                            <motion.button whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={() => setView('welcome')} className="px-12 py-5 bg-transparent text-[#2C2C2C] font-bold text-lg rounded-xl border border-[#2C2C2C]/20 transition-all">{t.retakeBtn}</motion.button>
                                        </div>
                                        <p className="text-[#A0A0A0] text-xs font-medium tracking-wide uppercase">
                                            Screenshot your result to share • แคปหน้าจอเพื่อแชร์ผลลัพธ์
                                        </p>
                                    </div>
                                </motion.section>
                            )}
                        </AnimatePresence>
                    </main>
                    <div className="fixed -bottom-40 -left-40 w-96 h-96 bg-[#6F4E37]/5 rounded-full blur-[120px] -z-10"></div>
                    <div className="fixed -top-40 -right-40 w-96 h-96 bg-[#2C2C2C]/5 rounded-full blur-[120px] -z-10"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
