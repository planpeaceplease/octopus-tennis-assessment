                        { id: "C", points: 3, text: { TH: "จับแบบ Continental ต่อยลูกวอลเลย์คุมทิศทางได้", EN: "Uses a continental grip with good directional control and punch" } },
                        { id: "D", points: 4, text: { TH: "หยอดหน้าเน็ต (Drop Volley) และจบแต้มได้เฉียบขาด", EN: "Decisively finishes points with crisp volleys and touch (drop volleys)" } }
                    ]
                },
                {
                    id: "d9",
                    category: { TH: "ลูกตบเหนือหัว (Overhead)", EN: "Overhead Execution" },
                    options: [
                        { id: "A", points: 1, text: { TH: "กะจังหวะพลาดบ่อย หรือต้องปล่อยให้ลูกตกพื้นก่อน", EN: "Poor timing, usually lets the ball bounce before hitting" } },
                        { id: "B", points: 2, text: { TH: "ตบลูกง่ายๆ ได้ แต่มักจะพลาดถ้าต้องถอยหลังตบ", EN: "Can put away easy lobs, but struggles when backpedaling" } },
                        { id: "C", points: 3, text: { TH: "ตบลูกได้ชัวร์แม้ยืนอยู่บริเวณเส้นเสิร์ฟ (Service Line)", EN: "Very reliable, even when hitting overheads from the service line" } },
                        { id: "D", points: 4, text: { TH: "กระโดดตบ (Scissor kick) หรือทำแต้มได้จากทุกจุด", EN: "Highly offensive; can hit scissor-kick overheads from almost anywhere" } }
                    ]
                },
                {
                    id: "d10",
                    category: { TH: "การงัดลูกล็อบและการตั้งรับ", EN: "Defense & Lobs" },
                    options: [
                        { id: "A", points: 1, text: { TH: "เมื่อเสียเปรียบ มักจะตีลูกโด่งสั้นๆ โดนดักตบ", EN: "Throws up short, defensive lobs that get easily put away" } },
                        { id: "B", points: 2, text: { TH: "งัดลูกล็อบโด่งเพื่อซื้อเวลาให้ตัวเองกลับมาตั้งหลักได้", EN: "Hits high, deep defensive lobs to buy time and reset the point" } },
                        { id: "C", points: 3, text: { TH: "ตีลูกท็อปสปินล็อบข้ามหัวคนขึ้นเน็ตได้", EN: "Can hit offensive topspin lobs effectively over the net player" } },
                        { id: "D", points: 4, text: { TH: "วิ่งสุดคอร์ตแล้วสวนกลับด้วย Passing Shot ได้ลุ้นเสมอ", EN: "Exceptional defense; constantly hits passing shots while on the dead run" } }
                    ]
                },
                {
                    id: "d11",
                    category: { TH: "จังหวะฝีเท้า (Footwork)", EN: "Footwork & Movement" },
                    options: [
                        { id: "A", points: 1, text: { TH: "ตีเสร็จแล้วมักจะยืนดูบอล ไม่วิ่งกลับมารอตรงกลาง", EN: "Tends to ball-watch after hitting, leading to slow recovery" } },
                        { id: "B", points: 2, text: { TH: "ครอบคลุมพื้นที่คอร์ตเดี่ยวได้ดี แต่ก้าวเท้ายังช้า", EN: "Covers the court reasonably well, but can be a bit heavy-footed" } },
                        { id: "C", points: 3, text: { TH: "ทำ Split-step สม่ำเสมอ และกลับเข้าตำแหน่งเร็ว", EN: "Always uses a split-step and recovers quickly to the center" } },
                        { id: "D", points: 4, text: { TH: "ออกตัวเร็วมาก สไลด์เท้าหรือปรับก้าวเล็กๆ ก่อนตีได้เนียน", EN: "Explosive first step with excellent micro-adjustments before striking" } }
                    ]
                },
                {
                    id: "d12",
                    category: { TH: "วิสัยทัศน์และแทคติก", EN: "Match IQ & Tactics" },
                    options: [
                        { id: "A", points: 1, text: { TH: "โฟกัสแค่วงสวิงตัวเอง ไม่ทันได้สังเกตคู่แข่ง", EN: "Focuses entirely on own swing mechanics, not the opponent" } },
                        { id: "B", points: 2, text: { TH: "เล่นแบบ Play Safe ตีโต้ไปเรื่อยๆ รอคู่แข่งพลาด", EN: "Plays 'safe' and mostly just waits for the opponent to make an error" } },
                        { id: "C", points: 3, text: { TH: "หาจุดอ่อนคู่แข่งเจอ (เช่น แบ็คแฮนด์อ่อน) และเจาะตรงนั้น", EN: "Quickly identifies and consistently targets the opponent's weaknesses" } },
                        { id: "D", points: 4, text: { TH: "สร้างรูปแบบการเข้าทำได้ และเปลี่ยนแผนแก้เกมได้ทันที", EN: "Strategically constructs points and easily adapts tactics mid-match" } }
                    ]
                }
            ]
        };

        function App() {
            const [currentLang, setCurrentLang] = useState('TH');
            const [view, setView] = useState('welcome');
            const [selectedMode, setSelectedMode] = useState(null);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [calculatedLevel, setCalculatedLevel] = useState(null);

            const toggleLanguage = () => setCurrentLang(prev => prev === 'TH' ? 'EN' : 'TH');

            const startQuiz = (mode) => {
                setSelectedMode(mode);
                setCurrentQuestionIndex(0);
                setScore(0);
                setSelectedAnswer(null);
                setView('quiz');
            };

            const handleNext = () => {
                if (selectedAnswer === null) return;
                const newScore = score + selectedAnswer;
                setScore(newScore);
                const questions = selectedMode === 'quick' ? appData.quickQuestions : appData.deepQuestions;
                if (currentQuestionIndex < questions.length - 1) {
                    setCurrentQuestionIndex(prev => prev + 1);
                    setSelectedAnswer(null);
                } else {
                    const avg = newScore / questions.length;
                    let level = "2.0";
                    if (avg >= 3.5) level = "4.5+";
                    else if (avg >= 3.0) level = "4.0";
                    else if (avg >= 2.5) level = "3.5";
                    else if (avg >= 2.0) level = "3.0";
                    else if (avg >= 1.5) level = "2.5";
                    else level = "2.0";
                    setCalculatedLevel(level);
                    setView('results');
                }
            };

            const copyResultLink = () => {
                const shareUrl = window.location.href;
                const isEn = currentLang === 'EN';
                
                navigator.clipboard.writeText(shareUrl).then(() => {
                    const btn = document.getElementById('copy-link-btn');
                    if (!btn) return;
                    const originalText = btn.innerHTML;
                    
                    btn.innerHTML = isEn ? "✅ Link Copied!" : "✅ คัดลอกลิงก์แล้ว!";
                    btn.classList.add('bg-green-600');
                    btn.classList.remove('bg-blue-600');
                    
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                        btn.classList.remove('bg-green-600');
                        btn.classList.add('bg-blue-600');
                    }, 2000);
                });
            };

            const t = appData.ui[currentLang];
            const questions = selectedMode === 'quick' ? appData.quickQuestions : appData.deepQuestions;
            const currentQuestion = questions ? questions[currentQuestionIndex] : null;
            const progress = questions ? ((currentQuestionIndex + 1) / questions.length) * 100 : 0;

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 overflow-x-hidden">
                    <nav className="flex items-center justify-between px-6 py-4 bg-white shadow-[0_4px_0_0_rgba(226,232,240,1)] sticky top-0 z-50">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('welcome')}>
                            <div className="text-3xl font-bold tracking-wide flex items-center z-10 font-fredoka">
                                <span className="text-blue-600 relative">
                                    O
                                    <span className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[0.4em] h-[0.4em] bg-amber-400 rounded-full -z-10"></span>
                                </span>
                                <span className="text-blue-600">ct</span>
                                <span className="text-amber-400">o</span>
                                <span className="text-blue-600">pus</span>
                                <span className="ml-2 text-2xl">🐙</span>
                            </div>
                        </div>
                        <button onClick={toggleLanguage} className={`font-bold py-2 px-6 rounded-full transition-all duration-200 shadow-sm active:scale-95 border-2 border-transparent ${currentLang === 'TH' ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-amber-400 text-slate-900 hover:bg-amber-500'}`}>
                            {currentLang === 'TH' ? 'EN' : 'TH'}
                        </button>
                    </nav>

                    <main className="max-w-5xl mx-auto px-6 py-12">
                        <AnimatePresence mode="wait">
                            {view === 'welcome' && (
                                <motion.section key="welcome" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="flex flex-col items-center text-center space-y-10">
                                    <div className="space-y-6">
                                        <h1 className="text-5xl md:text-7xl font-black text-slate-900 leading-[1.1] tracking-tight">
                                            {t.title} <br />
                                            <span className="text-blue-600 relative inline-block">
                                                {t.titleAccent}
                                                <span className="absolute -bottom-2 left-0 w-full h-3 bg-amber-400/40 -z-10 rounded-full"></span>
                                            </span>
                                        </h1>
                                        <p className="text-base md:text-lg text-slate-600 max-w-xl mx-auto font-medium leading-relaxed">{t.description}</p>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-center justify-center gap-6 w-full">
                                        <button onClick={() => startQuiz('quick')} className="w-full sm:w-64 px-8 py-4 bg-blue-600 text-white text-base md:text-lg font-bold rounded-full shadow-[0_6px_0_0_rgba(29,78,216,1)] hover:shadow-[0_2px_0_0_rgba(29,78,216,1)] hover:translate-y-1 transition-all duration-150 active:scale-95 flex flex-col items-center justify-center group">
                                            <span>{t.quickBtn}</span>
                                            <span className="text-xs font-medium opacity-70 group-hover:opacity-100">{t.quickTime}</span>
                                        </button>
                                        <button onClick={() => startQuiz('deep')} className="w-full sm:w-64 px-8 py-4 bg-amber-400 text-slate-900 text-base md:text-lg font-bold rounded-full shadow-[0_6px_0_0_rgba(217,119,6,1)] hover:shadow-[0_2px_0_0_rgba(217,119,6,1)] hover:translate-y-1 transition-all duration-150 active:scale-95 flex flex-col items-center justify-center group">
                                            <span>{t.deepBtn}</span>
                                            <span className="text-xs font-medium opacity-70 group-hover:opacity-100">{t.deepTime}</span>
                                        </button>
                                    </div>
                                </motion.section>
                            )}

                            {view === 'quiz' && currentQuestion && (
                                <motion.section key="quiz" initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.05 }} className="mt-4 max-w-2xl mx-auto">
                                    <div className="mb-8 space-y-2">
                                        <div className="flex justify-between items-end">
                                            <span className="text-sm font-black text-blue-600 uppercase tracking-widest">{selectedMode === 'quick' ? t.quickBtn : t.deepBtn}</span>
                                            <span className="text-sm font-bold text-slate-400">{currentQuestionIndex + 1} / {questions.length}</span>
                                        </div>
                                        <div className="h-4 bg-slate-200 rounded-full overflow-hidden border-2 border-slate-200 shadow-inner">
                                            <motion.div initial={{ width: 0 }} animate={{ width: `${progress}%` }} className="h-full bg-blue-600 rounded-full" />
                                        </div>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] p-8 md:p-10 shadow-[0_12px_0_0_rgba(226,232,240,1)] border-4 border-blue-600 relative overflow-hidden">
                                        <div className="relative z-10 space-y-8">
                                            <h2 className="text-2xl md:text-3xl font-black text-slate-900 leading-tight">{currentQuestion.category[currentLang]}</h2>
                                            <div className="grid gap-4">
                                                {currentQuestion.options.map((option) => (
                                                    <motion.button key={option.id} whileHover={{ scale: 1.02 }} whileTap={{ scale: 0.98 }} onClick={() => setSelectedAnswer(option.points)} className={`w-full p-5 text-left rounded-2xl border-4 transition-all duration-200 flex items-center gap-4 group ${selectedAnswer === option.points ? 'bg-amber-400 border-amber-500 shadow-[0_4px_0_0_rgba(217,119,6,1)] translate-y-[-2px]' : 'bg-slate-50 border-slate-100 hover:border-blue-200 hover:bg-blue-50 text-slate-700'}`}>
                                                        <span className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-lg shrink-0 transition-colors ${selectedAnswer === option.points ? 'bg-white text-amber-600' : 'bg-white text-slate-300 group-hover:text-blue-400'}`}>{option.id}</span>
                                                        <span className="font-bold text-base md:text-lg">{option.text[currentLang]}</span>
                                                    </motion.button>
                                                ))}
                                            </div>
                                            <div className="pt-4">
                                                <button onClick={handleNext} disabled={selectedAnswer === null} className={`w-full py-5 rounded-full font-black text-xl transition-all duration-200 shadow-lg ${selectedAnswer !== null ? 'bg-blue-600 text-white shadow-[0_6px_0_0_rgba(29,78,216,1)] hover:translate-y-1 hover:shadow-[0_2px_0_0_rgba(29,78,216,1)] active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                                    {currentQuestionIndex === questions.length - 1 ? t.finishBtn : t.nextBtn}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </motion.section>
                            )}

                            {view === 'results' && calculatedLevel && (
                                <motion.section key="results" initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} className="mt-4 max-w-3xl mx-auto">
                                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                                        {[...Array(20)].map((_, i) => (
                                            <motion.div key={i} initial={{ top: "-10%", left: `${Math.random() * 100}%`, rotate: 0, scale: Math.random() * 0.5 + 0.5 }} animate={{ top: "110%", rotate: 360, left: `${(Math.random() * 100) + (Math.random() * 20 - 10)}%` }} transition={{ duration: Math.random() * 2 + 2, repeat: Infinity, ease: "linear", delay: Math.random() * 2 }} className={`absolute w-4 h-4 rounded-sm ${['bg-blue-500', 'bg-amber-400', 'bg-pink-400', 'bg-green-400'][i % 4]}`} />
                                        ))}
                                    </div>
                                    <div className="bg-[#f8fafc] rounded-[3rem] p-8 md:p-12 shadow-[0_16px_0_0_rgba(226,232,240,1)] text-center space-y-10 border-4 border-amber-400 relative z-10">
                                        {(() => {
                                            const levelInfo = appData.levelData[calculatedLevel];
                                            return (
                                                <>
                                                    <motion.div 
                                                        initial={{ scale: 0 }} 
                                                        animate={{ scale: 1, rotate: [0, -10, 10, 0] }} 
                                                        transition={{ 
                                                            scale: { delay: 0.2, type: 'spring' },
                                                            rotate: { delay: 0.2, duration: 0.5 }
                                                        }} 
                                                        className="inline-block p-8 bg-amber-50 rounded-full text-6xl md:text-8xl"
                                                    >
                                                        {levelInfo.emoji}
                                                    </motion.div>
                                                    <div className="space-y-2">
                                                        <div className="flex flex-col items-center gap-1">
                                                            <span className="text-blue-600 font-black text-xl uppercase tracking-widest">Level {calculatedLevel}</span>
                                                            <h2 className="text-3xl md:text-5xl font-black text-slate-900 leading-tight">{levelInfo.name[currentLang]}</h2>
                                                        </div>
                                                        <p className="text-slate-600 text-base md:text-lg italic max-w-md mx-auto mt-4 leading-relaxed">
                                                            "{levelInfo.desc[currentLang]}"
                                                        </p>
                                                    </div>
                                                </>
                                            );
                                        })()}
                                        
                                        <div className="grid md:grid-cols-2 gap-6 text-left">
                                            <div className="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 space-y-4">
                                                <h3 className="font-black text-blue-600 flex items-center gap-2">🎾 {t.tournamentsLabel}</h3>
                                                <ul className="space-y-2">
                                                    {appData.levelData[calculatedLevel].tournaments[currentLang].map((tourney, idx) => (
                                                        <li key={idx} className="flex items-start gap-2 text-slate-700 font-bold text-sm"><span className="text-blue-400 mt-1">✦</span>{tourney}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                            <div className="bg-slate-50 p-6 rounded-3xl border-2 border-slate-100 space-y-4">
                                                <h3 className="font-black text-amber-500 flex items-center gap-2">💡 {t.tipsLabel}</h3>
                                                <ul className="space-y-2">
                                                    {appData.levelData[calculatedLevel].tips[currentLang].map((tip, idx) => (
                                                        <li key={idx} className="flex items-start gap-2 text-slate-700 font-bold text-sm"><span className="text-amber-400 mt-1">✦</span>{tip}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                        <div className="flex flex-col sm:flex-row justify-center gap-4 pt-4">
                                            <motion.button id="copy-link-btn" whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }} onClick={copyResultLink} className="px-12 py-5 bg-blue-600 text-white font-black text-xl rounded-full shadow-[0_6px_0_0_rgba(29,78,216,1)] hover:translate-y-1 hover:shadow-[0_2px_0_0_rgba(29,78,216,1)] transition-all">{t.copyBtn}</motion.button>
                                            <motion.button whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }} onClick={() => setView('welcome')} className="px-12 py-5 bg-slate-100 text-slate-600 font-black text-xl rounded-full shadow-[0_6px_0_0_rgba(226,232,240,1)] hover:translate-y-1 hover:shadow-[0_2px_0_0_rgba(226,232,240,1)] transition-all">{t.retakeBtn}</motion.button>
                                        </div>
                                        <p className="text-slate-400 text-sm font-bold">
                                            Tip: Screenshot your result to share! / เคล็ดลับ: แคปหน้าจอเพื่อแชร์ผลลัพธ์ของคุณ!
                                        </p>
                                    </div>
                                </motion.section>
                            )}
                        </AnimatePresence>
                    </main>
                    <div className="fixed -bottom-20 -left-20 w-64 h-64 bg-blue-100 rounded-full blur-3xl -z-10 opacity-50"></div>
                    <div className="fixed -top-20 -right-20 w-80 h-80 bg-amber-100 rounded-full blur-3xl -z-10 opacity-50"></div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
